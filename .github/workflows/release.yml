name: 发布版本 Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 配置 Go Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: 运行测试 Run tests
        run: go test ./...
      - name: 发布构建 Release build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
